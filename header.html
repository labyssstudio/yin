<!-- CROSS-PAGE NAV ROUTER -->
<script>
    function handleNav(mainHash, iframeSrc) {
    const iframe = document.getElementById('homeIframe');

    if (iframe) {
    // SCENARIO A: Currently inside the main page (index.html) -> Run normal functions
    if (typeof navigateToPath === 'function') {
    navigateToPath(mainHash);
    }
    if (iframeSrc) {
    iframe.src = iframeSrc;
    }
    } else {
    // SCENARIO B: On standalone home.html -> Force direct redirect back to root domain structure
    if (mainHash === '#about' || mainHash === '#catalog') {
    window.location.href = 'index.html' + mainHash;
    } else if (iframeSrc) {
    // For Contact or Home links, navigate to main page and pass target anchor down
    window.location.href = 'index.html' + mainHash;
    }
    }
    }
</script>
